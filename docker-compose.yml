# Single service: the job-hunter app (aiogram long-polling + a daily 10:00-local
# harvest). PostgreSQL is NOT bundled here — the app talks to an EXISTING shared
# Postgres (container "nexus-arcana-db") over the external "nexus-arcana_default"
# network. DATABASE_URL (host=nexus-arcana-db) is supplied by the host-side .env.
services:
  job-hunter:
    build:
      context: .
      # Inject the short git sha at BUILD time for the ops startup ping. The
      # .git dir is excluded from the image (.dockerignore), so the sha cannot
      # be read from git at runtime — it must be baked in here. Build with:
      #   GIT_SHA=$(git rev-parse --short HEAD) docker compose up -d --build
      # Falls back to "unknown" if GIT_SHA is not exported.
      args:
        GIT_SHA: "${GIT_SHA:-unknown}"
        # De-identified repo: the real dashboard display name is NOT tracked. It
        # comes from the VPS .env (gitignored) — Compose interpolates ${...} from
        # the project .env at build — and is baked into the SPA bundle by the
        # frontend stage. Unset -> generic "Кандидат". Both services build the
        # SHARED job-hunter:latest image, so the arg is set on BOTH to keep the
        # baked bundle consistent regardless of which service triggers the build.
        VITE_PROFILE_NAME: "${VITE_PROFILE_NAME:-}"
    image: job-hunter:latest
    container_name: job-hunter
    # Survive crashes and host reboots, but not an explicit `docker compose stop`.
    restart: unless-stopped

    # Join the EXISTING shared network so the app can resolve the Postgres host
    # "nexus-arcana-db" (the DB lives in another compose project). The network is
    # declared `external` below — it must already exist (created by nexus-arcana).
    networks:
      - nexus-arcana_default

    # Host-side .env (gitignored) is read at CONTAINER CREATE time — NOT baked
    # into the image. It supplies DATABASE_URL (host=nexus-arcana-db) and every
    # other secret. NOTE: changing .env requires `docker compose up -d
    # --force-recreate` to take effect (a plain restart re-uses the old env).
    env_file: .env

    # Container clock + scheduler timezone. TZ sets the OS clock so "10:00
    # local" is correct; SCHEDULE_TZ (read from env_file too) is what the
    # scheduler's cron trigger actually uses. Default to UTC only if TZ is unset
    # on the host so command stays valid; set TZ/SCHEDULE_TZ in .env to your tz.
    # DATABASE_URL is intentionally NOT set here — it comes from .env (env_file).
    environment:
      TZ: ${TZ:-UTC}

    volumes:
      # The REAL candidate profile lives on the HOST and is mounted READ-ONLY,
      # so personal data is never copied into the image. The app reads it at
      # config/profile.local.yaml (relative to WORKDIR /app).
      - ./config/profile.local.yaml:/app/config/profile.local.yaml:ro

    # No ports: the bot is outbound-only (long-polling + sending). No dashboard.

    # Liveness check: FRESHNESS of the heartbeat file (runbook pattern, like
    # Nexus/Arcana). serve writes the current epoch to /tmp/heartbeat every 30s
    # from a background asyncio task on the same loop as polling. The container
    # is healthy while that file is younger than 90s: if serve's loop wedges or
    # dies, the file goes stale and the check fails. This catches a HUNG process
    # that a mere "is the PID alive?" grep would miss.
    #
    # `$$` is Compose escaping: it renders to a literal `$` in the container, so
    # the actual shell runs:
    #   test $(( $(date +%s) - $(cat /tmp/heartbeat) )) -lt 90
    healthcheck:
      test: ["CMD-SHELL", "test $$(( $$(date +%s) - $$(cat /tmp/heartbeat) )) -lt 90"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s

  # ---------------------------------------------------------------------------
  # Dashboard (issue #6 part 1): the FastAPI read/draft dashboard served by
  # uvicorn, as its OWN container — SEPARATE from the bot above. It is published
  # ONLY on the VPS loopback (127.0.0.1) so the Telegram-login auth gating can be
  # verified before any public exposure. Public exposure (Caddy/DNS/TLS) is part
  # 2 and is intentionally NOT configured here.
  #
  # This service is INDEPENDENT of `job-hunter`: there is NO depends_on, so
  # bringing the dashboard up or down never recreates or disturbs the bot. It
  # only needs the external nexus-arcana-db (not part of this compose project),
  # reached via the shared network below.
  dashboard:
    # Reuse the EXACT build + image of the bot so both share one image (the
    # dashboard adds no new dependencies). `image: job-hunter:latest` means the
    # already-built bot image is reused; with --build the same image is rebuilt.
    build:
      context: .
      args:
        GIT_SHA: "${GIT_SHA:-unknown}"
        # Same as the bot service: real display name from the VPS .env
        # (gitignored), baked into the SPA at build. Unset -> generic "Кандидат".
        VITE_PROFILE_NAME: "${VITE_PROFILE_NAME:-}"
    image: job-hunter:latest
    container_name: dashboard
    restart: unless-stopped

    # The entrypoint (/docker-entrypoint.sh) runs `exec runuser -u appuser -- "$@"`,
    # so this command becomes "$@" and uvicorn runs as the non-root appuser.
    #
    # `--host 0.0.0.0` is the IN-CONTAINER bind and is REQUIRED + SAFE: Docker's
    # published-port forwarding connects to the container's IP, so uvicorn must
    # listen on all interfaces INSIDE the container. This is NOT a public
    # exposure — the loopback-only guarantee comes ENTIRELY from the host publish
    # prefix `127.0.0.1:` in `ports:` below, never from the in-container host.
    command: ["uvicorn", "job_hunter.webapi:app", "--host", "0.0.0.0", "--port", "8000"]

    # Join the SAME shared network as the bot so the dashboard can resolve both
    # the jobhunter DB and the auth DB on container "nexus-arcana-db".
    networks:
      - nexus-arcana_default

    # Same host-side .env as the bot — NO new env vars are required. It supplies
    # DATABASE_URL, AUTH_DATABASE_URL, SESSION_SECRET, COOKIE_DOMAIN,
    # SUPERUSER_TG_IDS, TG_LOGIN_BOT_TOKEN, TG_LOGIN_BOT_USERNAME, etc.
    env_file: .env

    # Mirror the bot's container clock timezone for consistency.
    environment:
      TZ: ${TZ:-UTC}

    volumes:
      # Same READ-ONLY profile mount as the bot, so the /draft endpoint's
      # build_deps can load the candidate profile.
      - ./config/profile.local.yaml:/app/config/profile.local.yaml:ro

    # LOOPBACK ONLY. The `127.0.0.1:` host prefix means the published port is
    # bound to the VPS loopback interface — it is NOT reachable from outside the
    # VPS. Format is host_ip:host_port:container_port. Do NOT change this to
    # `8001:8000` or `0.0.0.0:8001:8000`: either would publish on ALL host
    # interfaces and make the dashboard publicly reachable. Public exposure is
    # part 2 (Caddy reverse proxy), not this issue.
    ports:
      - "127.0.0.1:8001:8000"

    # Liveness check via PYTHON, not curl: the slim base image has NO curl (and
    # no wget). Python 3 IS in the image, so we use urllib to GET /login — a
    # PUBLIC route that returns 200 with no auth. urllib.request.urlopen raises
    # on any non-2xx response, which makes `python -c` exit non-zero -> the
    # container is reported unhealthy; a 200 exits 0 -> healthy. localhost:8000
    # is the in-container port (the left side of the ports mapping is irrelevant
    # inside the container).
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/login', timeout=3)\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ---------------------------------------------------------------------------
  # Login service (standalone SSO entry point at login.heylark.dev).
  # Reuses the same job-hunter:latest image (no new dependencies). Two routes:
  #   GET /              – Telegram Login Widget page
  #   GET /auth/callback – validates widget, sets hl_session cookie, redirects
  # No pipeline/store dependencies; reads only auth env vars from .env.
  # Public exposure (Caddy → login.heylark.dev) is configured separately.
  login:
    build:
      context: .
      args:
        GIT_SHA: "${GIT_SHA:-unknown}"
        VITE_PROFILE_NAME: "${VITE_PROFILE_NAME:-}"
    image: job-hunter:latest
    container_name: login
    restart: unless-stopped

    command: ["uvicorn", "job_hunter.login_service:app", "--host", "0.0.0.0", "--port", "8000"]

    networks:
      - nexus-arcana_default

    # Only auth-related vars needed; pipeline secrets (BOT_TOKEN, DATABASE_URL,
    # ANTHROPIC_API_KEY, etc.) from .env are loaded but never accessed at runtime.
    env_file: .env

    environment:
      TZ: ${TZ:-UTC}
      # Absolute origin for the widget data-auth-url (required for mobile login).
      # Set here (not in .env) since it is deployment-specific and not a secret.
      LOGIN_PUBLIC_URL: "https://login.heylark.dev"

    # LOOPBACK ONLY — same pattern as dashboard. Port 8002 on the host loopback;
    # Caddy terminates TLS and proxies to this.
    ports:
      - "127.0.0.1:8002:8000"

    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/', timeout=3)\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

# The shared Postgres network, owned by the nexus-arcana compose project. It must
# already exist; `external: true` tells Compose to attach, not create it.
networks:
  nexus-arcana_default:
    external: true
