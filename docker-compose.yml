# Single service: the job-hunter app (aiogram long-polling + a daily 10:00-local
# harvest). PostgreSQL is NOT bundled here — the app talks to an EXISTING shared
# Postgres (container "nexus-arcana-db") over the external "nexus-arcana_default"
# network. DATABASE_URL (host=nexus-arcana-db) is supplied by the host-side .env.
services:
  job-hunter:
    build:
      context: .
      # Inject the short git sha at BUILD time for the ops startup ping. The
      # .git dir is excluded from the image (.dockerignore), so the sha cannot
      # be read from git at runtime — it must be baked in here. Build with:
      #   GIT_SHA=$(git rev-parse --short HEAD) docker compose up -d --build
      # Falls back to "unknown" if GIT_SHA is not exported.
      args:
        GIT_SHA: "${GIT_SHA:-unknown}"
    image: job-hunter:latest
    container_name: job-hunter
    # Survive crashes and host reboots, but not an explicit `docker compose stop`.
    restart: unless-stopped

    # Join the EXISTING shared network so the app can resolve the Postgres host
    # "nexus-arcana-db" (the DB lives in another compose project). The network is
    # declared `external` below — it must already exist (created by nexus-arcana).
    networks:
      - nexus-arcana_default

    # Host-side .env (gitignored) is read at CONTAINER CREATE time — NOT baked
    # into the image. It supplies DATABASE_URL (host=nexus-arcana-db) and every
    # other secret. NOTE: changing .env requires `docker compose up -d
    # --force-recreate` to take effect (a plain restart re-uses the old env).
    env_file: .env

    # Container clock + scheduler timezone. TZ sets the OS clock so "10:00
    # local" is correct; SCHEDULE_TZ (read from env_file too) is what the
    # scheduler's cron trigger actually uses. Default to UTC only if TZ is unset
    # on the host so command stays valid; set TZ/SCHEDULE_TZ in .env to your tz.
    # DATABASE_URL is intentionally NOT set here — it comes from .env (env_file).
    environment:
      TZ: ${TZ:-UTC}

    volumes:
      # The REAL candidate profile lives on the HOST and is mounted READ-ONLY,
      # so personal data is never copied into the image. The app reads it at
      # config/profile.local.yaml (relative to WORKDIR /app).
      - ./config/profile.local.yaml:/app/config/profile.local.yaml:ro

    # No ports: the bot is outbound-only (long-polling + sending). No dashboard.

    # Liveness check: FRESHNESS of the heartbeat file (runbook pattern, like
    # Nexus/Arcana). serve writes the current epoch to /tmp/heartbeat every 30s
    # from a background asyncio task on the same loop as polling. The container
    # is healthy while that file is younger than 90s: if serve's loop wedges or
    # dies, the file goes stale and the check fails. This catches a HUNG process
    # that a mere "is the PID alive?" grep would miss.
    #
    # `$$` is Compose escaping: it renders to a literal `$` in the container, so
    # the actual shell runs:
    #   test $(( $(date +%s) - $(cat /tmp/heartbeat) )) -lt 90
    healthcheck:
      test: ["CMD-SHELL", "test $$(( $$(date +%s) - $$(cat /tmp/heartbeat) )) -lt 90"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s

# The shared Postgres network, owned by the nexus-arcana compose project. It must
# already exist; `external: true` tells Compose to attach, not create it.
networks:
  nexus-arcana_default:
    external: true
